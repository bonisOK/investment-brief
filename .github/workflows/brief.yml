name: Investment Brief

on:
  schedule:
    # Fire ~90 min before the brief is actually read (06:00 / 18:00 Bangkok).
    # GitHub's scheduler is best-effort and routinely late — the first run on
    # this repo landed 83 min after its slot — so the lead time is the buffer.
    # Minutes stay off :00, its most congested slot.
    - cron: "30 21 * * *"  # 04:30 Asia/Bangkok (UTC+7, no DST) -> read at 06:00
    - cron: "30 9 * * *"   # 16:30 Asia/Bangkok               -> read at 18:00
  workflow_dispatch: {}     # manual "Run workflow" button

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      # Carry the SQLite DB (ticker-resolution cache + run history) between runs.
      - uses: actions/cache@v4
        with:
          path: data
          key: brief-db-${{ github.run_id }}
          restore-keys: brief-db-

      - run: pip install -r requirements.txt

      - name: Run pipeline and render page
        env:
          SHEET_ID: ${{ secrets.SHEET_ID }}
          FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          APPS_SCRIPT_URL: ${{ secrets.APPS_SCRIPT_URL }}
        run: python -m app.render_static

      # Run from the repo root so StatiCrypt picks up ./.staticrypt.json. That
      # file pins the salt: "remember me" stores a salted hash in localStorage,
      # so a fresh random salt each build silently logs everyone out on every
      # run. The salt is not a secret — it ships in the published HTML.
      - name: Encrypt page (StatiCrypt)
        run: |
          npx -y staticrypt site/index.html -d dist \
            --template-title "Investment Brief" \
            --remember 365 \
            -p "${{ secrets.PAGE_PASSWORD }}"
          # Under 14 chars StatiCrypt prompts for confirmation; with no TTY it
          # aborts, writes nothing, and still exits 0. Fail here, not at upload.
          test -f dist/index.html

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - id: deployment
        uses: actions/deploy-pages@v4
